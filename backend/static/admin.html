<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · Video API Merkezi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Admin Panel</span>
    </div>
    <div class="topbar-right">
      <a class="ghost-btn" href="/">Stüdyo</a>
      <button type="button" class="ghost-btn" id="logoutBtn">Çıkış</button>
    </div>
  </header>

  <main class="admin-main">
    <section id="gate" class="auth-panel" hidden>
      <h1 class="display">Erişim yok</h1>
      <p class="lede" id="gateMsg">Bu panel yalnızca admin hesabına açık.</p>
      <a class="primary-btn" href="/" style="text-align:center;text-decoration:none;display:inline-block">Stüdyoya dön</a>
    </section>

    <section id="adminApp" hidden>
      <h1 class="display">Kontrol merkezi</h1>
      <p class="lede">Kullanıcılar, krediler ve üretim özeti — yalnızca senin hesabın.</p>

      <div class="stat-row" id="statRow">
        <div class="stat"><span class="stat-n" id="statUsers">—</span><span class="stat-l">Kullanıcı</span></div>
        <div class="stat"><span class="stat-n" id="statActive">—</span><span class="stat-l">Aktif</span></div>
        <div class="stat"><span class="stat-n" id="statScenarios">—</span><span class="stat-l">Senaryo</span></div>
        <div class="stat"><span class="stat-n" id="statJobs">—</span><span class="stat-l">Video işi</span></div>
      </div>

      <div class="admin-card">
        <div class="admin-card-head">
          <h2>Kullanıcılar</h2>
          <button type="button" class="ghost-btn" id="refreshBtn">Yenile</button>
        </div>
        <p class="form-error" id="adminError" hidden></p>
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>E-posta</th>
                <th>Kredi</th>
                <th>Durum</th>
                <th>İşlem</th>
              </tr>
            </thead>
            <tbody id="userRows"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/admin.js"></script>
</body>
</html>
